<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Threshold Game | Good Growth Foundation</title>
<meta name="description" content="You're the Chancellor for one Budget. Set the student loan repayment threshold and term, see who pays what, and find out if you crashed the economy. By the Good Growth Foundation.">
<meta property="og:title" content="The Threshold Game: could you fix student loans?">
<meta property="og:description" content="Play Chancellor for one Budget. Move the repayment threshold, balance the books, and find the sweet spot. By the Good Growth Foundation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://drem82.github.io/CalculatorSL/">
<meta property="og:image" content="https://drem82.github.io/CalculatorSL/share-card.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://drem82.github.io/CalculatorSL/share-card.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#112743; --bright-blue:#2361B4; --yellow:#C4D54B; --orange:#EC704A;
    --pale-blue:#99ACFF; --green:#00A787; --off-white:#EBEBEB; --card:#FFFFFF;
    --ink:#112743; --ink-soft:#4a5c75; --line:#d8dde4;
    --font:'Manrope', -apple-system, system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--navy); color:var(--ink); font-family:var(--font);
    min-height:100vh; padding:0 16px 60px; overflow-x:hidden;}
  html.embedded body{min-height:0;}
  input, select, textarea, button{font-family:var(--font);}
  .shape{position:fixed; z-index:0; pointer-events:none;}
  .shape-1{left:-150px; bottom:-130px; width:430px; opacity:.9;}
  .shape-2{right:-280px; top:-60px; width:660px; opacity:.85;}
  .shape-1 polygon, .shape-2 polygon{fill:var(--pale-blue);}
  @media(max-width:760px){
    .shape-1{width:280px; left:-110px; bottom:-90px;}
    .shape-2{width:380px; right:-170px;}
  }
  .wordmark{position:relative; z-index:2; max-width:920px; margin:0 auto; padding:28px 8px 0;
    color:#fff; font-weight:800; font-size:20px; line-height:1.15; letter-spacing:-.01em;}
  .wordmark span{display:block;}
  .wordmark small{display:block; margin-top:6px; font-size:11px; font-weight:700;
    letter-spacing:.24em; text-transform:uppercase; color:var(--pale-blue);}
  .slide{display:none; position:relative; z-index:1;}
  .slide:focus{outline:none;}
  .slide.active{display:block; animation:fadeUp .45s ease both;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
  @media(prefers-reduced-motion:reduce){.slide.active{animation:none;}}
  .hero{max-width:920px; margin:0 auto; padding:9vh 8px 60px; color:#fff;}
  .hero h1{font-weight:800; font-size:clamp(44px,8.5vw,86px); line-height:1.0;
    letter-spacing:-.03em; max-width:11ch;}
  .hero h1 em{font-style:normal; color:var(--yellow);}
  .hero .standfirst{max-width:540px; margin-top:26px; font-size:18px; font-weight:500;
    line-height:1.6; color:#fff;}
  .key-hint{margin-top:24px; font-size:13px; font-weight:700; color:#fff;
    display:flex; align-items:center; gap:7px; flex-wrap:wrap; line-height:1.9;
    position:relative; z-index:2;}
  .key-hint kbd{display:inline-flex; align-items:center; justify-content:center;
    min-width:24px; height:24px; padding:0 7px; border-radius:6px;
    background:rgba(153,172,255,.2); border:1px solid rgba(153,172,255,.6);
    box-shadow:0 1px 0 rgba(0,0,0,.3); color:#fff; font-family:var(--font);
    font-weight:800; font-size:13px; line-height:1;}
  @media(max-width:760px){.key-hint{display:none;}}
  .btn{display:inline-block; border:none; cursor:pointer; text-decoration:none; font-family:var(--font);
    font-weight:800; font-size:16px; letter-spacing:.01em; padding:16px 32px;
    border-radius:999px; background:var(--yellow); color:var(--navy);
    transition:transform .15s ease, background .15s ease;}
  .btn:hover{transform:translateY(-2px); background:#d4e45c;}
  .btn:focus-visible{outline:3px solid #fff; outline-offset:3px;}
  .btn.secondary{background:transparent; color:#fff; border:2px solid var(--pale-blue);}
  .btn.secondary:hover{background:rgba(153,172,255,.12);}
  .btn.blue{background:var(--bright-blue); color:#fff;}
  .btn.blue:hover{background:#2d74d4;}
  .hero .btn{margin-top:30px;}
  .step-label{max-width:920px; margin:18px auto 0; padding:0 8px; font-size:11px;
    font-weight:800; letter-spacing:.24em; text-transform:uppercase; color:var(--pale-blue);
    position:relative; z-index:1;}
  .card{max-width:920px; margin:10px auto 0; background:var(--card); border-radius:16px;
    box-shadow:0 30px 60px rgba(0,0,0,.4);}
  .ledger-rule{height:8px; border-radius:8px 8px 0 0;
    background:linear-gradient(90deg, var(--bright-blue) 0 25%, var(--green) 25% 50%, var(--yellow) 50% 75%, var(--orange) 75% 100%);}
  .panel{padding:30px clamp(20px,5vw,44px);}
  .panel + .panel{border-top:1px solid var(--line);}
  .panel-label{font-size:11px; letter-spacing:.24em; text-transform:uppercase; font-weight:800;
    color:var(--bright-blue); margin-bottom:18px; display:flex; align-items:center; gap:12px;}
  .panel-label::after{content:''; flex:1; height:2px; background:var(--off-white);}
  .panel h2{font-weight:800; font-size:clamp(24px,4vw,32px); letter-spacing:-.02em; margin-bottom:8px;}
  .panel .lede{font-size:15px; font-weight:500; color:var(--ink-soft); line-height:1.6; max-width:62ch;}
  .controls-bar{position:sticky; top:0; z-index:30; background:var(--card);
    border-radius:16px 16px 0 0; box-shadow:0 10px 24px rgba(17,39,67,.14);
    padding:18px clamp(20px,5vw,44px) 16px; border-bottom:1px solid var(--line);}
  .controls{display:grid; grid-template-columns:1fr 1fr; gap:14px 36px;}
  @media(max-width:680px){.controls{grid-template-columns:1fr;}}
  .control .ctl-head{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .control .ctl-head label{font-weight:800; font-size:13px; letter-spacing:-.01em;}
  .ctl-value{display:flex; align-items:baseline; gap:2px; font-weight:800;}
  .ctl-value .cur{font-size:13px; color:var(--ink-soft);}
  .ctl-value input{font-family:var(--font); font-weight:800; font-size:17px; width:84px;
    background:transparent; border:none; border-bottom:2px solid var(--navy); color:var(--navy);
    text-align:right; padding:0 0 1px; font-variant-numeric:tabular-nums;}
  .ctl-value input:focus{outline:none; border-bottom-color:var(--bright-blue);}
  .ctl-value .unit{font-size:12px; font-weight:600; color:var(--ink-soft);}
  input[type=range]{width:100%; margin-top:8px; accent-color:var(--bright-blue); height:20px; cursor:pointer;}
  input[type=range]:focus-visible{outline:3px solid var(--yellow); outline-offset:2px; border-radius:4px;}
  /* "Today" reference marker overlaid on a slider track */
  .slider-wrap{position:relative;}
  .slider-marker{position:absolute; top:8px; bottom:auto; height:20px; width:2px;
    background:var(--orange); transform:translateX(-1px); pointer-events:none; z-index:2;
    border-radius:1px;}
  .slider-marker::after{content:attr(data-label); position:absolute; top:-15px; left:50%;
    transform:translateX(-50%); font-size:9.5px; font-weight:800; letter-spacing:.02em;
    color:var(--orange); white-space:nowrap; text-transform:uppercase;}
  .ctl-note{font-size:11px; font-weight:600; color:var(--ink-soft); margin-top:3px;}
  .chart-wrap{margin-top:10px;}
  .chart-wrap svg{width:100%; height:auto; display:block;}
  .chart-caption{font-size:12px; font-weight:600; color:var(--ink-soft); margin-top:10px; line-height:1.5;}
  .legend{display:flex; flex-wrap:wrap; gap:18px; margin-top:8px; font-size:12px; font-weight:700;}
  .legend span{display:inline-flex; align-items:center; gap:7px;}
  .legend i{width:14px; height:14px; border-radius:3px; display:inline-block;}
  .big-number{font-weight:800; font-size:clamp(34px,6vw,52px); font-variant-numeric:tabular-nums;
    line-height:1.1; letter-spacing:-.02em; color:var(--navy);}
  .big-number.gain{color:var(--green);}
  .big-number.cost{color:var(--orange);}
  .sub-number{font-size:14px; font-weight:600; color:var(--ink-soft); margin-top:8px; max-width:48ch;}
  .fig-row{display:flex; flex-wrap:wrap; gap:12px; margin-top:12px;}
  .fig{flex:1 1 130px; min-width:120px; padding:14px 16px; border:1px solid var(--line); border-radius:12px; background:var(--card);}
  .fig .k{display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; color:var(--ink-soft);}
  .fig .v{display:block; font-weight:800; font-size:clamp(24px,4.5vw,34px); font-variant-numeric:tabular-nums; line-height:1.15; margin-top:4px;}
  .fig .u{display:block; font-size:11px; font-weight:600; color:var(--ink-soft); margin-top:2px;}
  .fig.save{border-color:var(--green); background:rgba(0,167,135,.07);}
  .fig.save .v{color:var(--green);}
  .lifetime{font-size:15px; font-weight:700; color:var(--ink); margin-top:14px; max-width:52ch; line-height:1.5;}
  .lifetime b{color:var(--green); font-weight:800;}
  .plan-treasury{margin-top:22px; padding-top:18px; border-top:1px solid var(--line);}
  .pt-fig{font-weight:800; font-size:clamp(26px,4.5vw,38px); font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1.1;}
  .pt-fig:empty{display:none;}
  .pt-fig.cost{color:var(--green);}
  .pt-fig.gain{color:var(--orange);}
  .report-card{background:var(--navy); color:#fff; border-radius:12px;
    padding:26px clamp(18px,4vw,32px); margin-top:6px;}
  .report-card h3{font-weight:800; font-size:21px; letter-spacing:-.02em;}
  .report-card p{font-size:14px; font-weight:500; color:var(--pale-blue); line-height:1.6;
    margin-top:8px; max-width:56ch;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 18px; margin-top:18px;}
  @media(max-width:680px){.form-grid{grid-template-columns:1fr;}}
  .form-field label{display:block; font-size:11px; font-weight:800; letter-spacing:.14em;
    text-transform:uppercase; color:var(--pale-blue); margin-bottom:6px;}
  .form-field label .opt{font-weight:600; text-transform:none; letter-spacing:0; opacity:.8;}
  .form-field input{width:100%; font-family:var(--font); font-weight:600; font-size:15px;
    padding:12px 14px; border-radius:8px; border:2px solid rgba(153,172,255,.4);
    background:rgba(255,255,255,.06); color:#fff;}
  .form-field input::placeholder{color:rgba(153,172,255,.55);}
  .form-field input:focus{outline:none; border-color:var(--yellow);}
  .form-actions{margin-top:18px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .form-msg{font-size:13px; font-weight:700;}
  .form-msg.err{color:var(--orange);}
  .small-print{font-size:11.5px; font-weight:500; color:rgba(255,255,255,.88); margin-top:14px; line-height:1.6;}
  .verdict-panel{text-align:center; padding-top:42px; padding-bottom:36px; background:var(--off-white);}
  .stamp{display:inline-block; padding:16px 34px; border-radius:999px; font-weight:800;
    font-size:clamp(22px,4.5vw,36px); letter-spacing:-.01em; color:#fff;
    text-transform:uppercase; background:var(--orange);}
  .stamp.green{background:var(--green);}
  .stamp.amber{background:var(--yellow); color:var(--navy);}
  @keyframes slam{0%{transform:scale(1.6); opacity:0;} 60%{transform:scale(.95); opacity:1;} 100%{transform:scale(1);}}
  .stamp.slam{animation:slam .4s cubic-bezier(.2,.8,.3,1.15) both;}
  @media(prefers-reduced-motion:reduce){.stamp.slam{animation:none;}}
  .verdict-sub{margin:20px auto 0; max-width:560px; font-size:16px; font-weight:500; line-height:1.6;}
  .neutral-hint{margin-top:16px; font-size:13px; font-weight:700; color:var(--bright-blue); line-height:1.6;}
  .neutral-hint b{color:var(--navy);}
  .equiv-list{list-style:none; margin-top:10px;}
  .equiv-list li{display:flex; align-items:center; gap:20px; padding:20px 0;
    border-bottom:1px solid var(--line); font-size:18px; line-height:1.4; font-weight:600;}
  .equiv-list li:last-child{border-bottom:none;}
  .equiv-count{font-weight:800; font-size:34px; min-width:120px; text-align:right;
    font-variant-numeric:tabular-nums; flex-shrink:0; color:var(--orange); letter-spacing:-.02em;}
  .equiv-list.you .equiv-count{color:var(--green);}
  /* Icon tiles sit at the head of each row, colour-matched to the list */
  .equiv-icon{display:inline-flex; align-items:center; justify-content:center;
    width:60px; height:60px; flex-shrink:0; border-radius:15px;
    background:rgba(236,112,74,.12); color:var(--orange);}
  .equiv-list.you .equiv-icon{background:rgba(0,167,135,.12); color:var(--green);}
  .equiv-icon svg{width:36px; height:36px;}
  @media(max-width:560px){
    .equiv-list li{gap:14px; padding:16px 0; font-size:16px;}
    .equiv-count{font-size:27px; min-width:72px;}
    .equiv-icon{width:50px; height:50px; border-radius:13px;}
    .equiv-icon svg{width:30px; height:30px;}
  }
  .proposal-input{max-width:420px; margin-top:14px;}
  .proposal-input .ctl-head{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .proposal-input label{font-weight:800; font-size:14px;}
  details.method{margin-top:22px; font-size:13px; color:var(--ink-soft); line-height:1.7;}
  details.method summary{cursor:pointer; font-weight:800; font-size:12px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--bright-blue); margin-bottom:8px;}
  details.method p + p{margin-top:8px;}
  .navrow{max-width:920px; margin:22px auto 0; position:sticky; bottom:12px; z-index:40; display:flex;
    align-items:center; justify-content:space-between; gap:16px; padding:12px 16px;
    background:rgba(17,39,67,.85); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(153,172,255,.22); border-radius:999px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);}
  @supports not ((backdrop-filter:blur(8px)) or (-webkit-backdrop-filter:blur(8px))){
    .navrow{background:var(--navy);}
  }
  .dots{display:flex; gap:9px;}
  .dots i{width:9px; height:9px; border-radius:50%; background:rgba(153,172,255,.4);
    transition:background .2s, transform .2s;}
  .dots i.on{background:var(--yellow); transform:scale(1.25);}

  /* ===== Share your verdict ===== */
  .share-cta{padding:6px clamp(20px,5vw,44px) 34px; text-align:center; background:var(--off-white);}
  .share-cta h3{font-weight:800; font-size:clamp(20px,3.2vw,26px); letter-spacing:-.01em; color:var(--navy);}
  .share-cta p{font-size:14.5px; font-weight:600; color:var(--ink-soft); margin:6px auto 16px; max-width:44ch; line-height:1.5;}
  .share-open-btn{display:inline-flex; align-items:center; gap:11px; font-size:19px; padding:18px 46px;
    box-shadow:0 10px 26px rgba(196,213,75,.5);}
  .share-open-btn svg{width:22px; height:22px;}

  .share-overlay{position:fixed; inset:0; z-index:1000; display:none; align-items:flex-start; justify-content:center;
    background:rgba(9,18,33,.72); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    padding:24px 16px; overflow-y:auto;}
  .share-overlay.open{display:flex; animation:fadeUp .3s ease both;}
  .share-modal{position:relative; width:100%; max-width:520px; background:var(--card); border-radius:18px;
    box-shadow:0 30px 80px rgba(0,0,0,.5); padding:26px clamp(18px,4vw,30px) 28px; margin:auto;}
  .share-modal h3{font-weight:800; font-size:22px; letter-spacing:-.02em; color:var(--navy); padding-right:36px;}
  .share-modal .share-lede{font-size:13.5px; font-weight:600; color:var(--ink-soft); margin-top:5px; line-height:1.5;}
  .share-close{position:absolute; top:16px; right:16px; width:36px; height:36px; border-radius:50%;
    border:none; cursor:pointer; background:var(--off-white); color:var(--navy); font-size:20px; font-weight:800;
    line-height:1; display:flex; align-items:center; justify-content:center; transition:background .15s;}
  .share-close:hover{background:#dcdfe4;}
  .share-close:focus-visible{outline:3px solid var(--bright-blue); outline-offset:2px;}

  .share-toggle{display:inline-flex; margin:18px auto 14px; padding:4px; background:var(--off-white);
    border-radius:999px; gap:2px;}
  .share-toggle button{border:none; cursor:pointer; background:transparent; color:var(--ink-soft);
    font-weight:800; font-size:12.5px; letter-spacing:.02em; padding:9px 16px; border-radius:999px;
    transition:background .15s, color .15s;}
  .share-toggle button.on{background:var(--card); color:var(--navy); box-shadow:0 2px 6px rgba(17,39,67,.14);}
  .share-toggle button:focus-visible{outline:2px solid var(--bright-blue); outline-offset:1px;}
  .share-toggle-wrap{text-align:center;}

  .share-preview{position:relative; width:100%; aspect-ratio:1/1; border-radius:12px; overflow:hidden;
    background:var(--navy); box-shadow:0 12px 30px rgba(17,39,67,.28);}
  .share-preview canvas{width:100%; height:100%; display:block;}

  .share-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px;}
  .share-btn{display:flex; align-items:center; justify-content:center; gap:9px; cursor:pointer;
    border:none; border-radius:10px; font-family:var(--font); font-weight:800; font-size:14px;
    padding:13px 14px; color:#fff; transition:transform .12s, filter .15s; text-decoration:none;}
  .share-btn:hover{transform:translateY(-2px); filter:brightness(1.05);}
  .share-btn:focus-visible{outline:3px solid var(--navy); outline-offset:2px;}
  .share-btn svg{width:19px; height:19px; flex-shrink:0;}
  .share-btn.wide{grid-column:1 / -1;}
  .share-btn.primary{background:var(--bright-blue);}
  .share-btn.download{background:var(--navy);}
  .share-btn.x{background:#000;}
  .share-btn.wa{background:#25D366; color:#062e13;}
  .share-btn.li{background:#0A66C2;}
  .share-btn.fb{background:#1877F2;}
  .share-btn.copy{background:var(--green);}
  .share-hint{font-size:12px; font-weight:600; color:var(--ink-soft); margin-top:14px; line-height:1.5; text-align:center;}
  .share-toast{position:absolute; left:50%; bottom:14px; transform:translateX(-50%) translateY(8px);
    background:var(--navy); color:#fff; font-weight:800; font-size:13px; padding:9px 18px; border-radius:999px;
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; white-space:nowrap;}
  .share-toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  @media(max-width:480px){
    .share-modal{padding:22px 16px 24px;}
  }
</style>
</head>
<body>

<svg class="shape shape-1" aria-hidden="true" viewBox="0 0 1130 1250"><polygon points="1129.02 0 334.93 0 329.6 0 .21 334.31 .98 702.28 329.27 702.28 .98 1035.74 .98 1250 795.07 1250 800.4 1250 1129.49 915.69 1129.72 547.72 800.73 547.72 1129.02 214.26 1129.02 0"/></svg>
<svg class="shape shape-2" aria-hidden="true" viewBox="0 0 2270 936.08"><polygon points="476.23 -.17 0 476.76 0 936.25 455.7 936.02 881.53 508.64 881.53 936.25 1337.22 936.02 2270 -.17 476.23 -.17"/></svg>

<div class="wordmark">
  <small id="heroTagline"></small>
</div>

<!-- SLIDE 0 · HERO -->
<section class="slide active" id="slide-0" aria-label="Welcome">
  <div class="hero">
    <h1 id="heroTitle"></h1>
    <p class="standfirst" id="heroStandfirst"></p>
    <button class="btn" id="startBtn" data-go="1"></button>
    <p class="key-hint" id="keyHint"></p>
  </div>
</section>

<!-- SLIDE 1 · THE BUDGET -->
<section class="slide" id="slide-1" aria-label="Your Budget">
  <p class="step-label" id="stepLabel1"></p>
  <div class="card">
    <div class="controls-bar">
      <div class="controls">
        <div class="control">
          <div class="ctl-head">
            <label for="threshold" id="lblThreshold"></label>
            <span class="ctl-value"><span class="cur">£</span><input type="number" id="threshold" min="15000" max="70000" step="100" value="29385" inputmode="numeric"></span>
          </div>
          <div class="slider-wrap">
            <input type="range" id="thresholdSlider" min="20000" max="70000" step="100" value="29385" aria-label="Threshold slider">
            <span class="slider-marker" id="thresholdMarker" data-label="Current" aria-hidden="true"></span>
          </div>
          <p class="ctl-note" id="noteThreshold"></p>
        </div>
        <div class="control">
          <div class="ctl-head">
            <label for="term" id="lblTerm"></label>
            <span class="ctl-value"><input type="number" id="term" min="30" max="40" step="1" value="30" inputmode="numeric" style="width:52px"><span class="unit">yrs</span></span>
          </div>
          <div class="slider-wrap">
            <input type="range" id="termSlider" min="30" max="40" step="1" value="30" aria-label="Term slider">
            <span class="slider-marker" id="termMarker" data-label="Current" aria-hidden="true"></span>

    methodP1: "This is an illustrative, directional model: a game, not an official fiscal costing. The graduate earnings distribution is split into twelve bands from ONS ASHE 2025 full-time earnings percentiles, scaled by a 1.125 graduate premium. Repayments are 9% of income above the chosen threshold, per year, for the chosen term, weighted across bands and multiplied by the 2022/23 cohort of 108,340 borrowers (DfE/LEO). The baseline calibrates within 2.8% of the IFS benchmark for average lifetime repayments.",
    methodP2: "Caveats: for the cohort figures, earnings are held flat (no career progression), loan balances, interest and write-offs aren't simulated, behaviour doesn't change, and figures are undiscounted cash for a single cohort, so cash neutrality is not fiscal neutrality, since repayments pushed into later years are worth less in today's money. The cost equivalents in the 'what you could buy' and 'sacrifice' lists use published per-unit figures from official and independent sources: potholes at roughly £70 each (Department for Transport / gov.uk, from the £500m-for-7-million-potholes funding round, a figure also used by Full Fact); free school meals at £490 per child per year (Institute for Fiscal Studies, derived from the gov.uk grant rate of £490.20, and also used by the House of Commons Library); a newly qualified nurse's starting salary of £32,073 (NHS Employers, Agenda for Change Band 5, 2026/27; £31,049 in 2025/26); a newly qualified teacher's starting salary of £32,916 outside London (the September 2025 M1 point of the statutory School Teachers' Pay and Conditions Document, via DfE / gov.uk); and around £1bn for a new NHS hospital (House of Commons Library, which puts replacement hospitals at 'on average over £1 billion per hospital', consistent with the New Hospital Programme's 46 hospitals for £60bn). They are starting salaries and indicative ballparks for scale, not full employer or project costs. Plan 2 rules as at April 2026: threshold £29,385, rate 9%, 30-year write-off. The Graduate Guarantee threshold of £33,542 restores the real value of the £25,000 threshold set in 2018."

<script>
(function(){

  // ===================================================================
  // CONFIG
  // PROPOSAL_THRESHOLD: the Graduate Guarantee threshold (£33,542,
  //   restoring the 2018 real value of the £25,000 threshold) used on
  //   the final page.
  // ===================================================================
  var PROPOSAL_THRESHOLD = 33542;

  // Fallback: if game-text.js fails to load, show a clear warning rather
  // than a silently blank game.
  if (!window.GAME_TEXT){
    document.body.innerHTML = '<div style="max-width:560px;margin:20vh auto;padding:32px;background:#fff;border-radius:12px;font-family:\'Manrope\',sans-serif;color:#112743;"><h2>Text file missing</h2><p>The game could not load <b>game-text.js</b>. Check the file exists in the repository with exactly that name (lowercase, hyphen) and reload.</p></div>';
    return;
  }
  var T = window.GAME_TEXT;

  // ===== Model =====
  var BANDS = [
    [26988.75,0.10],[28960.875,0.10],[31926.375,0.05],[33861.375,0.05],
    [36964.125,0.10],[41522.625,0.10],[46823.625,0.10],[53053.875,0.10],
    [58569.75,0.05],[63614.25,0.05],[76492.125,0.10],[99508.5,0.10]
  ];
  var RATE = 0.09, BASE_THRESHOLD = 29385, BASE_TERM = 30, COHORT = 108340;

  function annual(mid, thr){ return Math.max(0, mid-thr)*RATE; }
  function weightedLifetime(thr, term){
    var s=0;
    for (var i=0;i<BANDS.length;i++) s += BANDS[i][1]*annual(BANDS[i][0],thr)*term;
    return s;
  }
  var BASELINE = weightedLifetime(BASE_THRESHOLD, BASE_TERM);
  function cohortEffect(thr, term){ return (weightedLifetime(thr,term)-BASELINE)*COHORT; }
  function cashNeutralTerm(thr){
    for (var y=30;y<=40;y++) if (cohortEffect(thr,y) >= 0) return y;
    return null;
  }

  // The GGF plan = raised threshold + a term extension that keeps the cohort
  // broadly cash-neutral. PLAN_TERM is that neutral term (backend only, never
  // shown to the user). PLAN_EFFECT is the plan's net lifetime effect on the
  // Treasury for the 2022/23 cohort (negative = relief delivered to graduates,
  // positive = small net gain to the Treasury).
  var PLAN_TERM = cashNeutralTerm(PROPOSAL_THRESHOLD) || BASE_TERM;
  var PLAN_EFFECT = cohortEffect(PROPOSAL_THRESHOLD, PLAN_TERM);

  // ===== Formatting =====
  var gbp0 = new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP',maximumFractionDigits:0});
  var num0 = new Intl.NumberFormat('en-GB',{maximumFractionDigits:0});
  function fmtBig(x){
    var a=Math.abs(x);
    if (a>=1e9) return '\u00a3'+(a/1e9).toFixed(2).replace(/\.?0+$/,'')+'bn';
    if (a>=1e6) return '\u00a3'+Math.round(a/1e6)+'m';
    return gbp0.format(a);
  }
  function fmt(s, map){
    return s.replace(/\{(\w+)\}/g, function(m,k){ return (k in map) ? map[k] : m; });
  }

  // ===== Verdict =====
  // Cohort effect ranges roughly -£5.6bn (most generous, threshold £70k)
  // to +£5.6bn (harshest) across the slider extremes. The Graduate
  // Guarantee (£33,542 + a term extension to ~36yr) lands in the sweet spot.
  // Cost bands are recalibrated to that range so the gradations are
  // meaningful: "economy crashed" now sits at the genuinely reckless
  // end (>= £5bn cost for a single cohort).
  function verdict(effect, thr, term){
    var cost = -effect, V = T.verdict;
    // Spot on: the Graduate Guarantee policy zone (£33,300-£33,700),
    // financed anywhere from no extension up to the cash-neutral six-year
    // extension (terms 30-36). Checked first so it beats the cost bands,
    // and so financing the policy via the term lever KEEPS the badge
    // rather than dropping to a lesser verdict.
    if (thr >= 33300 && thr <= 33700 && term >= BASE_TERM && term <= 36){
      return {v:V.graduateGuarantee, c:'green'};
    }
    if (cost >= 5e9) return {v:V.econCrashed, c:''};
    if (cost >= 2.5e9) return {v:V.marketsRattled, c:''};
    // "Sums don't add up" floor lowered to £950m so thresholds just above
    // the policy zone (~£33.8k-£34k at 30yr, costing £984m-£1.05bn) fold in.
    if (cost >= 9.5e8) return {v:V.obrLetter, c:'amber'};
    // Middle zone: costs below £950m, plus near-balanced budgets and gains.
    if (cost > -2.5e8){
      // Sweet spot: financed to balance (within ±£250m) at a real threshold.
      if (cost < 2.5e8 && thr >= 33000) return {v:V.sweetSpot, c:'green'};
      // Getting warmer: a meaningful raise (£31k-£33.3k) that delivers real
      // relief but stops short of the full Graduate Guarantee.
      if (thr >= 31000) return {v:V.notBadNotGood, c:'amber'};
      // Dials untouched.
      if (thr === BASE_THRESHOLD && term === BASE_TERM) return {v:V.nothingChanges, c:'amber'};
      // Below £31k: barely moved.
      return {v:V.tinkering, c:'amber'};
    }
    var gain = -cost;
    // Over-extension: a meaningful threshold rise (£31k+), but the term has
    // been pushed so far the Treasury comes out ahead overall. Graduates get
    // monthly relief now but repay for many more years - a balance question,
    // not a giveaway. Distinct from genuinely harsher loans below.
    if (thr >= 31000) return {v:V.balanceCheck, c:'amber'};
    // Otherwise the gain comes from a flat or lowered threshold: graduates
    // are squeezed, with little or no relief in return.
    if (gain < 1e9) return {v:V.nusWar, c:''};
    if (gain < 2e9) return {v:V.gradsMarch, c:''};
    return {v:V.collapse, c:''};
  }

    pint: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8h10l-1 12H8L7 8z"/><path d="M7 8c-.5-2.6 1.2-4 2.8-3.4C10.2 3 11.6 3 12.4 4c1.4-.6 3 .2 3 1.7 1.5.1 2.2 1.4 1.3 2.3"/><path d="M8.5 12h7"/></svg>',
    gym: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/></svg>',
    shop: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 11a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>',
    pothole: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18h18"/><path d="M8 18c0-3 1.2-5 4-5s4 2 4 5"/><path d="M3 14h3M18 14h3"/></svg>',
    meals: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="6"/><path d="M5 6h14"/><path d="M9 3v3M15 3v3"/></svg>',
    nurse: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/><path d="M12 6.2v3.6M10.2 8h3.6"/></svg>',
    teacher: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M7 9v4c0 1.5 2.2 2.6 5 2.6s5-1.1 5-2.6V9"/><path d="M21 7v5"/></svg>',
    hospital: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="17" rx="1.5"/><path d="M12 8v6M9 11h6"/><path d="M4 21h16"/></svg>'
  };
  function renderEquivs(el, amount, items, fallback, cls){
    el.className='equiv-list'+(cls?' '+cls:'');
    el.innerHTML='';
    var picks=[];
    for (var i=items.length-1;i>=0 && picks.length<3;i--){
      var n=amount/items[i].cost;
      if (n>=1) picks.push({n:n,label:items[i].label,one:items[i].one,icon:items[i].icon});
    }
    if (!picks.length){
      var liF=document.createElement('li');
      var dash=document.createElement('span'); dash.className='equiv-count'; dash.textContent='\u00b7';
      var sp=document.createElement('span'); sp.textContent=fallback;
      liF.appendChild(dash); liF.appendChild(sp); el.appendChild(liF);
      return;
    }
    picks.sort(function(a,b){return a.n-b.n;});
    picks.forEach(function(p){
      var li=document.createElement('li');
      if (p.icon && ICONS[p.icon]){
        var ic=document.createElement('span'); ic.className='equiv-icon';
        ic.innerHTML=ICONS[p.icon]; li.appendChild(ic);
      }
      var c=document.createElement('span'); c.className='equiv-count'; c.textContent=num0.format(Math.floor(p.n));
      var l=document.createElement('span'); l.textContent=(Math.floor(p.n)===1 && p.one) ? p.one : p.label;
      li.appendChild(c); li.appendChild(l); el.appendChild(li);
    });
  }

  // ===== Charts =====
  function bandLabel(m){ return '\u00a3'+Math.round(m/1000)+'k'; }

  function renderChartA(thr){
    var vals=BANDS.map(function(b){ return annual(b[0],thr); });
    var W=760, H=300, mL=46, mR=12, mT=30, mB=44;
    var iw=W-mL-mR, ih=H-mT-mB;
    var maxV=Math.max.apply(null, vals.concat([100]));
    function y(v){ return mT + (maxV-v)/maxV*ih; }
    var zeroY=y(0), n=BANDS.length, slot=iw/n, bw=Math.min(40, slot*0.62);
    var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" font-family="Manrope, sans-serif">';
    svg+='<line x1="'+mL+'" y1="'+zeroY+'" x2="'+(W-mR)+'" y2="'+zeroY+'" stroke="#112743" stroke-width="1.5"/>';
    svg+='<text x="'+(mL-8)+'" y="'+(zeroY+4)+'" text-anchor="end" font-size="11" font-weight="700" fill="#4a5c75">\u00a30</text>';
    for (var i=0;i<n;i++){
      var v=vals[i], x=mL+slot*i+(slot-bw)/2, barTop=y(v), barH=Math.max(zeroY-barTop,2);
      svg+='<rect x="'+x+'" y="'+barTop+'" width="'+bw+'" height="'+barH+'" rx="4" fill="#2361B4"/>';
      svg+='<text x="'+(x+bw/2)+'" y="'+(barTop-6)+'" text-anchor="middle" font-size="10.5" font-weight="800" fill="#112743">\u00a3'+num0.format(Math.round(v))+'</text>';
      svg+='<text x="'+(x+bw/2)+'" y="'+(H-22)+'" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4a5c75">'+bandLabel(BANDS[i][0])+'</text>';
    }
    svg+='<text x="'+(mL+iw/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="10" font-weight="600" fill="#4a5c75">'+T.chartA.axisCaption+'</text>';
    svg+='</svg>';
    document.getElementById('chartAWrap').innerHTML=svg;
  }

  function renderChartB(thr){
    var vals=BANDS.map(function(b){ return annual(b[0],BASE_THRESHOLD)-annual(b[0],thr); });
    var W=760, H=300, mL=52, mR=12, mT=30, mB=54;
    var iw=W-mL-mR, ih=H-mT-mB;
    var maxV=Math.max.apply(null, vals.concat([50]));
    var minV=Math.min.apply(null, vals.concat([0]));
    var span=(maxV-minV)||1;
    function y(v){ return mT + (maxV-v)/span*ih; }
    var zeroY=y(0), n=BANDS.length, slot=iw/n, bw=Math.min(40, slot*0.62);
    var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" font-family="Manrope, sans-serif">';
    svg+='<line x1="'+mL+'" y1="'+zeroY+'" x2="'+(W-mR)+'" y2="'+zeroY+'" stroke="#112743" stroke-width="1.5"/>';
    svg+='<text x="'+(mL-8)+'" y="'+(zeroY+4)+'" text-anchor="end" font-size="11" font-weight="700" fill="#4a5c75">\u00a30</text>';
    for (var i=0;i<n;i++){
      var v=vals[i], x=mL+slot*i+(slot-bw)/2;
      var barTop=v>=0?y(v):zeroY;
      var barH=Math.max(Math.abs(y(v)-zeroY),2);
      var fill=v<0?'#EC704A':'#00A787';
      svg+='<rect x="'+x+'" y="'+barTop+'" width="'+bw+'" height="'+barH+'" rx="4" fill="'+fill+'"/>';
      var lblY=v>=0?barTop-6:barTop+barH+13;
      var lbl=(v<0?'\u2212':'')+'\u00a3'+num0.format(Math.round(Math.abs(v)));
      svg+='<text x="'+(x+bw/2)+'" y="'+lblY+'" text-anchor="middle" font-size="10.5" font-weight="800" fill="'+(v<0?'#EC704A':'#112743')+'">'+lbl+'</text>';
      svg+='<text x="'+(x+bw/2)+'" y="'+(H-22)+'" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4a5c75">'+bandLabel(BANDS[i][0])+'</text>';
    }
    svg+='<text x="'+(mL+iw/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="10" font-weight="600" fill="#4a5c75">'+T.chartA.axisCaption+'</text>';
    svg+='</svg>';
    document.getElementById('chartBWrap').innerHTML=svg;

    var cap=document.getElementById('chartBCaption');
    var hasPos=vals.some(function(v){return v>0.5;}), hasNeg=vals.some(function(v){return v<-0.5;});
    if (hasPos && hasNeg) cap.textContent=T.chartB.captionMixed;
    else if (hasPos) cap.textContent=T.chartB.captionBetter;
    else if (hasNeg) cap.textContent=T.chartB.captionWorse;
    else cap.textContent=T.chartB.captionSame;
  }

  // ===== State & DOM =====
  var $=function(id){return document.getElementById(id);};
  var threshold=$('threshold'), thresholdSlider=$('thresholdSlider');
  var term=$('term'), termSlider=$('termSlider');
  var salary=$('salary'), salarySlider=$('salarySlider');
  var stamp=$('stamp'), lastVerdict='', currentVerdictTitle='';

  function vals(){
    return {
      thr: Math.max(0, +threshold.value||0),
      term: Math.min(40, Math.max(30, +term.value||30)),
      sal: Math.max(0, +salary.value||0)
    };
  }

  function update(){
    var v=vals();
    renderChartA(v.thr);
    renderChartB(v.thr);

    // Treasury bill
    var effect=cohortEffect(v.thr, v.term);
    var tc=$('treasuryCost');
    tc.textContent=(effect<0?'\u2212':'+')+fmtBig(effect);
    tc.className='big-number '+(effect<0?'cost':'gain');
    $('treasurySub').textContent = effect<-2.5e8 ? T.treasury.subCost
      : effect>2.5e8 ? T.treasury.subGain : T.treasury.subNeutral;

    // Verdict
    var vd=verdict(effect, v.thr, v.term);
    currentVerdictTitle=vd.v.title;
    if (vd.v.title!==lastVerdict){
      lastVerdict=vd.v.title;
      stamp.textContent=vd.v.title;
      stamp.className='stamp '+vd.c+' slam';
      void stamp.offsetWidth;
    }
    $('verdictSub').textContent=vd.v.sub;

    // Cheat sheet
    var hint=$('neutralHint');
    if (effect < -2.5e8){
      var nt=cashNeutralTerm(v.thr);
      hint.innerHTML = nt ? fmt(T.hints.canBalance,{YEARS:nt}) : T.hints.structural;
    } else if (effect>=-2.5e8 && effect<2.5e8 && v.term>30){
      hint.innerHTML=fmt(T.hints.balanced,{EXTENSION:(v.term-30)});
    } else {
      hint.textContent='';
    }

    // Sacrifice
    var intro=$('sacrificeIntro');
    if (effect < -2.5e8){
      intro.textContent=T.sacrifice.introCost;
      renderEquivs($('treasuryEquivs'), Math.abs(effect), T.sacrifice.items, T.sacrifice.fallback, '');
    } else if (effect > 2.5e8){
      intro.textContent=T.sacrifice.introGain;
      renderEquivs($('treasuryEquivs'), effect, T.sacrifice.items, T.sacrifice.fallback, '');
    } else {
      intro.textContent=T.sacrifice.introNeutral;
      $('treasuryEquivs').innerHTML='';
    }

    // Graduate Guarantee page (fixed proposal, independent of sliders)
    var nowRepay  = annual(v.sal, BASE_THRESHOLD);
    var planRepay = annual(v.sal, PROPOSAL_THRESHOLD);
    var saving = Math.max(0, nowRepay - planRepay);
    $('figNow').textContent  = gbp0.format(Math.round(nowRepay));
    $('figPlan').textContent = gbp0.format(Math.round(planRepay));
    $('figSave').textContent = gbp0.format(Math.round(saving));
    $('yourMonthly').textContent = saving>0.5
      ? fmt(T.proposal.monthlyPositive,{MONTHLY:gbp0.format(Math.round(saving/12))})
      : (v.sal<=BASE_THRESHOLD ? T.proposal.belowThreshold : T.proposal.noChange);
    var spoils=$('spoilsIntro');
    if (saving>0.5){
      spoils.textContent=T.spoils.introPositive;
      renderEquivs($('yourEquivs'), saving, T.spoils.items, T.spoils.fallbackPositive, 'you');
    } else {
      spoils.textContent='';
      $('yourEquivs').innerHTML='';
    }

  }

  function link(numEl, rangeEl){
    rangeEl.addEventListener('input', function(){ numEl.value=rangeEl.value; update(); });
    numEl.addEventListener('input', function(){
      var v=+numEl.value||0;
      rangeEl.value=Math.min(Math.max(v,+rangeEl.min),+rangeEl.max);
      update();
    });
  }
  link(threshold,thresholdSlider); link(term,termSlider); link(salary,salarySlider);

  // ===== "Today" reference markers on the threshold and term sliders =====
  // Place each marker over the point on the track where the thumb sits for
  // the current real-world value (threshold £29,385; term 30 years). The
  // native thumb centre travels between thumbW/2 and width-thumbW/2, so we
  // inset by half a thumb width (~10px) at each end for an accurate line-up.
  function placeMarker(rangeEl, markerEl, value){
    if (!rangeEl || !markerEl) return;
    var min=+rangeEl.min, max=+rangeEl.max, w=rangeEl.offsetWidth;
    if (!w || max===min) return;
    var thumb=18, usable=w-thumb;
    var frac=(value-min)/(max-min);
    markerEl.style.left=(thumb/2 + frac*usable)+'px';
  }
  function positionMarkers(){
    placeMarker(thresholdSlider, $('thresholdMarker'), BASE_THRESHOLD); // £29,385
    placeMarker(termSlider, $('termMarker'), BASE_TERM);               // 30 years
  }
  window.addEventListener('resize', positionMarkers);

  // ===== Plan-level Treasury readout (final slide; constant, not slider-driven) =====
  function renderPlanTreasury(){
    var fig=$('planTreasuryFig'), sub=$('planTreasurySub'), e=PLAN_EFFECT;
    if (Math.abs(e) < 2.5e8){          // within the neutral band
      fig.textContent=''; fig.className='pt-fig';
      sub.textContent=T.proposal.treasuryNeutral;
    } else if (e < 0){                 // net cost = relief delivered to graduates
      fig.textContent=fmtBig(e); fig.className='pt-fig cost';
      sub.textContent=T.proposal.treasuryCost;
    } else {                           // net gain to the Treasury
      fig.textContent='+'+fmtBig(e); fig.className='pt-fig gain';
      sub.textContent=T.proposal.treasuryGain;
    }
  }

  // ===== Static copy =====
  function applyStaticText(){
    $('heroTagline').textContent=T.hero.tagline;
    $('heroTitle').innerHTML=T.hero.title;
    $('heroStandfirst').textContent=T.hero.standfirst;
    $('startBtn').textContent=T.hero.startButton;
    $('keyHint').innerHTML=T.hero.keyHint;
    $('lblThreshold').textContent=T.controls.thresholdLabel;
    $('noteThreshold').textContent=T.controls.thresholdNote;
    $('lblTerm').textContent=T.controls.termLabel;
    $('noteTerm').textContent=T.controls.termNote;
    $('stepLabel1').textContent=T.steps.budget;
    $('stepLabel2').textContent=T.steps.verdict;
    $('stepLabel3').textContent=T.steps.fix;
    $('chartAPanelLabel').textContent=T.chartA.panelLabel;
    $('chartAHeading').textContent=T.chartA.heading;
    $('chartALede').textContent=T.chartA.lede;
    $('legendA').textContent=T.chartA.legendBar;
    $('chartBPanelLabel').textContent=T.chartB.panelLabel;
    $('chartBHeading').textContent=T.chartB.heading;
    $('chartBLede').textContent=T.chartB.lede;
    $('legendBPos').textContent=T.chartB.legendPos;
    $('legendBNeg').textContent=T.chartB.legendNeg;
    $('treasuryPanelLabel').textContent=T.treasury.panelLabel;
    $('treasuryHeading').textContent=T.treasury.heading;
    $('sacrificePanelLabel').textContent=T.sacrifice.panelLabel;
    $('propPanelLabel').textContent=T.proposal.panelLabel;
    $('propHeading').textContent=T.proposal.heading;
    $('propLede').textContent=T.proposal.lede;
    $('lblSalary').textContent=T.proposal.salaryLabel;
    $('noteSalary').textContent=T.proposal.salaryNote;
    $('savingHeading').textContent=T.proposal.savingHeading;
    $('figNowK').textContent=T.proposal.payNowLabel;
    $('figPlanK').textContent=T.proposal.payPlanLabel;
    $('figSaveK').textContent=T.proposal.saveLabel;
    $('figNowU').textContent=T.proposal.perYearNote;
    $('figPlanU').textContent=T.proposal.perYearNote;
    $('figSaveU').textContent=T.proposal.perYearNote;
    $('planTreasuryLabel').textContent=T.proposal.treasuryHeading;
    renderPlanTreasury();
    $('financingPanelLabel').textContent=T.proposal.financingPanelLabel;
    $('financingBody').textContent=T.proposal.financingBody;
    $('spoilsPanelLabel').textContent=T.spoils.panelLabel;
    $('methodSummary').textContent=T.smallPrint.methodSummary;
    $('methodP1').textContent=T.smallPrint.methodP1;
    $('methodP2').textContent=T.smallPrint.methodP2;
    $('stamp').textContent=T.verdict.awaiting;
    $('navBack1').textContent=T.nav.back;
    $('navNext1').textContent=T.nav.toVerdict;
    $('navBack2').textContent=T.nav.backToBudget;
    $('navNext2').textContent=T.nav.toProposal;
    $('navBack3').textContent=T.nav.back;
    $('navPlay').textContent=T.nav.readReport; $('navPlay').href=T.email.url;
  }

  // ===== Slides =====
  var slides=document.querySelectorAll('.slide');
  var dotGroups=document.querySelectorAll('.dots');
  dotGroups.forEach(function(g){
    for (var i=0;i<slides.length;i++){ var d=document.createElement('i'); g.appendChild(d); }
  });
  function goTo(n){
    slides.forEach(function(s,i){ s.classList.toggle('active', i===n); });
    dotGroups.forEach(function(g){
      Array.prototype.forEach.call(g.children, function(d,i){ d.classList.toggle('on', i===n); });
    });
    window.scrollTo({top:0, behavior:'auto'});
    if (window.self !== window.top){ try { parent.postMessage({ ggfScrollTop: true }, '*'); } catch (e) {} }
    if (n===1) positionMarkers();   // sliders now visible: line up the "Today" markers
    if (n===2){ lastVerdict=''; update(); }
    // Move focus to the new slide so keyboard and screen-reader users follow along.
    var active=slides[n];
    if (active){ active.setAttribute('tabindex','-1'); active.focus({preventScroll:true}); }
  }
  document.body.addEventListener('click', function(e){
    var b=e.target.closest('[data-go]');
    if (b) goTo(+b.getAttribute('data-go'));
  });
  document.addEventListener('keydown', function(e){
    var cur=Array.prototype.findIndex.call(slides,function(s){return s.classList.contains('active');});
    if (e.key==='ArrowRight' && cur<slides.length-1 && !e.target.matches('input')) goTo(cur+1);
    if (e.key==='ArrowLeft' && cur>0 && !e.target.matches('input')) goTo(cur-1);
  });

  // init
  applyStaticText();
  update();
})();
</script>
<script>
/* =====================================================================
   SHARE YOUR VERDICT  (self-contained; reads the live verdict from the DOM,
   paints a branded share card on a <canvas>, and offers native share,
   download, and one-tap posting to X / WhatsApp / LinkedIn / Facebook.)
   ===================================================================== */
(function(){
  'use strict';
  var T = window.GAME_TEXT; if(!T) return;
  var SH = T.share || {};
  var $ = function(id){ return document.getElementById(id); };

  var overlay = $('shareOverlay');
  var canvas  = $('shareCanvas');
  if(!overlay || !canvas) return;
  var ctx = canvas.getContext('2d');
  var modal = overlay.querySelector('.share-modal');

  var currentStyle = 'standard';
  var lastBlob = null;
  var FONTS_READY = false;
  var enc = encodeURIComponent;

  // Brand palette (mirrors the CSS :root tokens).
  var C = { navy:'#112743', blue:'#2361B4', yellow:'#C4D54B', orange:'#EC704A',
            paleBlue:'#99ACFF', green:'#00A787', white:'#FFFFFF' };

  // Decorative polygons lifted straight from the page's background shapes.
  var SHAPE1 = "1129.02 0 334.93 0 329.6 0 .21 334.31 .98 702.28 329.27 702.28 .98 1035.74 .98 1250 795.07 1250 800.4 1250 1129.49 915.69 1129.72 547.72 800.73 547.72 1129.02 214.26 1129.02 0";
  var SHAPE2 = "476.23 -.17 0 476.76 0 936.25 455.7 936.02 881.53 508.64 881.53 936.25 1337.22 936.02 2270 -.17 476.23 -.17";

  // ---------- static text ----------
  function setText(id, val){ var el=$(id); if(el) el.textContent = val||''; }
  setText('shareCtaHeading', SH.ctaHeading);
  setText('shareCtaSub', SH.ctaSub);
  setText('shareOpenLabel', SH.ctaButton);
  setText('shareModalTitle', SH.modalTitle);
  setText('shareModalLede', SH.modalLede);
  (function(){ var le=$('shareModalLede'); if(le && !(SH.modalLede||'').trim()) le.style.display='none'; })();
  setText('shareNativeLabel', SH.nativeButton);
  setText('shareDownloadLabel', SH.downloadButton);
  setText('shareCopyLabel', SH.copyButton);
  setText('shareHint', SH.hint);
  // Card is locked to the "standard" style.

  // ---------- logo ----------
  var logoImg=null, logoReady=false;
  (function loadLogo(){
    var src = SH.logoDataUri || SH.logoUrl;
    if(!src) return;
    var img=new Image();
    if(SH.logoUrl && !SH.logoDataUri) img.crossOrigin='anonymous';
    img.onload=function(){ logoImg=img; logoReady=true; if(overlay.classList.contains('open')) draw(); };
    img.onerror=function(){ logoImg=null; logoReady=false; };
    img.src=src;
  })();

  // ---------- helpers ----------
  function accentFor(c){ return c==='green'? C.green : c==='amber'? C.yellow : C.orange; }
  function textOn(c){ return c==='amber'? C.navy : C.white; }

  function roundRect(x,y,w,h,r){
    r = Math.min(r, h/2, w/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function drawPoly(str, ox, oy, s){
    var n = str.trim().split(/\s+/).map(parseFloat);
    ctx.beginPath();
    for(var i=0;i<n.length;i+=2){
      var x=ox+n[i]*s, y=oy+n[i+1]*s;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.fill();
  }
  function fitSingle(text, maxW, start, min, weight){
    var s=start;
    while(s>min){
      ctx.font = weight+' '+s+'px Manrope, sans-serif';
      if(ctx.measureText(text).width<=maxW) break;
      s-=2;
    }
    return s;
  }
  function wrap(text, size, weight, maxW){
    ctx.font = weight+' '+size+'px Manrope, sans-serif';
    var words=text.split(' '), lines=[], line='';
    for(var i=0;i<words.length;i++){
      var test = line ? line+' '+words[i] : words[i];
      if(ctx.measureText(test).width>maxW && line){ lines.push(line); line=words[i]; }
      else line=test;
    }
    if(line) lines.push(line);
    return lines;
  }
  function spaced(text, cx, y, size, weight, colour, spacing){
    ctx.font = weight+' '+size+'px Manrope, sans-serif';
    ctx.fillStyle = colour; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    var ch=text.split(''), total=0, i;
    for(i=0;i<ch.length;i++) total += ctx.measureText(ch[i]).width + (i<ch.length-1?spacing:0);
    var x=cx-total/2;
    for(i=0;i<ch.length;i++){ ctx.fillText(ch[i],x,y); x+=ctx.measureText(ch[i]).width+spacing; }
    ctx.textAlign='center';
  }

  // ---------- read the live verdict ----------
  function readState(){
    var stampEl=$('stamp'), cls=stampEl?stampEl.className:'';
    var colour = /\bgreen\b/.test(cls) ? 'green' : /\bamber\b/.test(cls) ? 'amber' : 'red';
    var equivs=[];
    var host=$('treasuryEquivs');
    if(host){
      Array.prototype.forEach.call(host.querySelectorAll('li'), function(li){
        var c=li.querySelector('.equiv-count'), lbl=li.querySelector('span:last-child');
        if(c && lbl){
          var cv=c.textContent.trim();
          if(cv && cv!=='·') equivs.push({count:cv, label:lbl.textContent.trim()});
        }
      });
    }
    return {
      title:  stampEl ? stampEl.textContent.trim() : '',
      colour: colour,
      blurb:  $('verdictSub')   ? $('verdictSub').textContent.trim()   : '',
      cost:   $('treasuryCost') ? $('treasuryCost').textContent.trim() : '',
      costSub:$('treasurySub')  ? $('treasurySub').textContent.trim()  : '',
      thr:    Math.round(+(($('threshold')||{}).value)||0),
      term:   Math.round(+(($('term')||{}).value)||30),
      equivs: equivs
    };
  }

  // ---------- card sections ----------
  function drawStamp(title, topY, accent, txtC, startSize){
    var maxTextW = 1080 - 180;
    var size = fitSingle(title, maxTextW, startSize||80, 40, '800');
    var lines;
    if(size < 50){ size = 58; lines = wrap(title, size, '800', maxTextW); }
    else lines = [title];
    ctx.font='800 '+size+'px Manrope, sans-serif';
    var textW=0; lines.forEach(function(l){ textW=Math.max(textW, ctx.measureText(l.toUpperCase()).width); });
    var lineH=size*1.06, padX=52, padY=28;
    var pw=textW+padX*2, ph=lines.length*lineH+padY*2, px=540-pw/2;
    roundRect(px, topY, pw, ph, Math.min(ph/2, 64));
    ctx.fillStyle=accent; ctx.fill();
    ctx.fillStyle=txtC; ctx.textAlign='center'; ctx.textBaseline='middle';
    var ty=topY+padY+lineH/2;
    lines.forEach(function(l){ ctx.fillText(l.toUpperCase(), 540, ty); ty+=lineH; });
    ctx.textBaseline='alphabetic';
    return topY+ph;
  }
  function drawBudgetLine(st, y){
    var line='Threshold £'+Number(st.thr).toLocaleString('en-GB')+'  ·  '+st.term+'-year term';
    var size=fitSingle(line, 900, 40, 24, '700');
    ctx.font='700 '+size+'px Manrope, sans-serif';
    ctx.fillStyle=C.white; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(line, 540, y+size);
    return y+size+8;
  }
  function drawCostFigure(st, y, figStart, subSize, maxLines){
    var big=st.cost||'', isGain=big.charAt(0)==='+';
    var figCol=isGain?C.green:C.orange;              // the ONE coloured element
    var size=fitSingle(big, 940, figStart||120, 60, '800');
    ctx.font='800 '+size+'px Manrope, sans-serif';
    ctx.fillStyle=figCol; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(big, 540, y+size);
    var yy=y+size+22;
    if(st.costSub){
      var ss=subSize||31, lines=wrap(st.costSub, ss, '600', 860).slice(0, maxLines||3);
      ctx.fillStyle=C.white; ctx.font='600 '+ss+'px Manrope, sans-serif';
      lines.forEach(function(l){ yy+=ss*1.28; ctx.fillText(l,540,yy); });
    }
    return yy+8;
  }
  function drawBlurb(text, y, maxLines){
    if(!text) return y;
    var SMAX=34, SMIN=22, W=860;
    // Split into whole sentences (keep terminators). Never cut mid-sentence.
    var parts=text.match(/[^.!?]+[.!?]+(?:\s|$)/g);
    if(!parts || !parts.length) parts=[text];
    parts=parts.map(function(s){ return s.trim(); });
    // Greedily keep as many complete sentences as fit at the base size.
    var chosen='', lines=null, size=SMAX, acc='';
    for(var i=0;i<parts.length;i++){
      var cand=(acc?acc+' ':'')+parts[i];
      var wl=wrap(cand, SMAX, '600', W);
      if(wl.length<=maxLines){ acc=cand; chosen=cand; lines=wl; }
      else break;
    }
    // If even the first sentence overflows, keep it whole and shrink to fit.
    if(!chosen){
      chosen=parts[0]; size=SMAX;
      while(size>SMIN && wrap(chosen, size, '600', W).length>maxLines) size-=1;
      lines=wrap(chosen, size, '600', W);
    }
    ctx.fillStyle=C.white; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font='600 '+size+'px Manrope, sans-serif';
    var yy=y;
    lines.forEach(function(l){ yy+=size*1.4; ctx.fillText(l, 540, yy); });
    return yy;
  }
  function drawSacrifice(st, y){
    if(!st.equivs.length) return y;
    ctx.strokeStyle='rgba(153,172,255,0.28)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(150,y); ctx.lineTo(930,y); ctx.stroke();
    y+=42;
    spaced('THE SACRIFICE', 540, y, 22, '800', C.paleBlue, 4);
    y+=14;
    st.equivs.slice(0,3).forEach(function(e){
      y+=56;
      var cSize=44, gap=14;
      ctx.font='800 '+cSize+'px Manrope, sans-serif';
      var cW=ctx.measureText(e.count).width;
      var lSize=30;
      ctx.font='600 '+lSize+'px Manrope, sans-serif';
      while(cW+gap+ctx.measureText(e.label).width>840 && lSize>18){ lSize-=2; ctx.font='600 '+lSize+'px Manrope, sans-serif'; }
      var lW=ctx.measureText(e.label).width, sx=540-(cW+gap+lW)/2;
      ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      ctx.fillStyle=st.colour==='green'?C.green:C.orange;
      ctx.font='800 '+cSize+'px Manrope, sans-serif'; ctx.fillText(e.count, sx, y);
      ctx.fillStyle=C.white; ctx.font='600 '+lSize+'px Manrope, sans-serif';
      ctx.fillText(e.label, sx+cW+gap, y-(cSize-lSize)*0.12);
      ctx.textAlign='center';
    });
    return y;
  }
  function drawHeader(){
    var title=SH.cardTagline||'';
    if(logoReady && logoImg){
      var targetH=132, w=logoImg.width*(targetH/logoImg.height);
      if(w>680){ w=680; targetH=logoImg.height*(w/logoImg.width); }
      ctx.drawImage(logoImg, 540-w/2, 46, w, targetH);
      var base=46+targetH+62;
      var ts=fitSingle(title, 820, 46, 30, '800');
      ctx.fillStyle=C.white; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.font='800 '+ts+'px Manrope, sans-serif';
      ctx.fillText(title, 540, base);
      return base+14;
    }
    var ts2=fitSingle(title, 820, 50, 30, '800');
    ctx.fillStyle=C.white; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font='800 '+ts2+'px Manrope, sans-serif';
    ctx.fillText(title, 540, 130);
    return 148;
  }
  function drawFooter(showCta){
    ctx.strokeStyle='rgba(153,172,255,0.22)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(150,936); ctx.lineTo(930,936); ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    if(showCta!==false){
      ctx.fillStyle=C.white; ctx.textAlign='center'; ctx.font='800 27px Manrope, sans-serif';
      ctx.fillText(SH.cardFooterCta||'', 540, 982);
      spaced(SH.cardBrand||'GOOD GROWTH FOUNDATION', 540, 1018, 20, '800', C.white, 4);
    } else {
      spaced(SH.cardBrand||'GOOD GROWTH FOUNDATION', 540, 1000, 22, '800', C.white, 4);
    }
  }

  // ---------- compose ----------
  function draw(){
    var st=readState();
    ctx.clearRect(0,0,1080,1080);
    ctx.fillStyle=C.navy; ctx.fillRect(0,0,1080,1080);
    ctx.save(); ctx.globalAlpha=0.13; ctx.fillStyle=C.paleBlue;
    drawPoly(SHAPE2, 300, -70, 0.42);          // top-right sweep
    drawPoly(SHAPE1, -140, 640, 0.42);         // bottom-left block
    ctx.restore();

    var accent=accentFor(st.colour), txtC=textOn(st.colour);
    var hb=drawHeader();

    if(currentStyle==='minimal'){
      var b=drawStamp(st.title, Math.max(hb+180, 400), accent, txtC);
      ctx.fillStyle=C.white; ctx.textAlign='center';
      var q=wrap('Could you fix student loans?', 44, '700', 800);
      var qy=b+130; ctx.font='700 44px Manrope, sans-serif';
      q.forEach(function(l){ ctx.fillText(l,540,qy); qy+=54; });
      drawFooter(false);
    } else if(currentStyle==='detailed'){
      var y2=drawStamp(st.title, hb+28, accent, txtC, 96)+40;
      y2=drawCostFigure(st, y2, 108, 27, 2)+16;
      drawSacrifice(st, y2);
      drawFooter(true);
    } else { // standard
      var y=drawStamp(st.title, hb+110, accent, txtC, 112)+70;
      drawBlurb(st.blurb, y, 6);
      drawFooter(true);
    }
    try { canvas.toBlob(function(b){ lastBlob=b; }, 'image/png'); } catch(e){}
  }

  function ensureFonts(cb){
    if(FONTS_READY || !document.fonts){ cb(); return; }
    var loads=[
      document.fonts.load('800 100px Manrope'),
      document.fonts.load('700 100px Manrope'),
      document.fonts.load('600 100px Manrope')
    ];
    Promise.all(loads).then(function(){ FONTS_READY=true; cb(); }).catch(function(){ cb(); });
  }

  // ---------- captions / links ----------
  function caption(){
    var st=readState(), url=SH.shareUrl||location.href;
    return (SH.caption||'').replace('{VERDICT}', st.title).replace('{URL}', url).trim();
  }
  var SHARE_URL = SH.shareUrl || location.href;

  function toast(msg){
    var t=$('shareToast'); if(!t) return;
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.remove('show'); }, 1600);
  }

  // ---------- actions ----------
  function doDownload(){
    var url;
    try { url=canvas.toDataURL('image/png'); }
    catch(e){ /* tainted by a cross-origin logoUrl */ logoImg=null; logoReady=false; draw(); try{ url=canvas.toDataURL('image/png'); }catch(e2){ toast('Could not save image'); return; } }
    var a=document.createElement('a');
    a.download='my-threshold-verdict.png';
    a.href=url;
    document.body.appendChild(a); a.click(); a.remove();
    toast(SH.savedToast||'Image saved');
  }
  // True only when the browser can share the actual image FILE (all modern
  // phones + Safari/Chrome on many desktops). This is the one path that pushes
  // the picture itself into another app.
  var nativeFiles=false;
  try { nativeFiles = !!(navigator.canShare && navigator.canShare({ files:[new File([new Blob()], 't.png', {type:'image/png'})] })); } catch(e){ nativeFiles=false; }

  function shareData(){
    if(!lastBlob) return null;
    var file=new File([lastBlob], 'my-threshold-verdict.png', {type:'image/png'});
    return { files:[file], text:caption(), title:SH.modalTitle||'Can You Fix Student Loans?' };
  }
  function doNative(){
    var data=shareData();
    if(nativeFiles && data && navigator.canShare(data)){ navigator.share(data).catch(function(){}); return; }
    doDownload();
  }
  // Platform buttons. Web share intents (wa.me, LinkedIn, Facebook, X) CANNOT
  // attach a local image, so: if the device supports sharing files, use the
  // native sheet (image + caption + link in one go — it lists WhatsApp, LinkedIn
  // etc). Otherwise save the image AND copy the caption+link AND open the
  // platform's composer, so the user just attaches the picture and pastes.
  function shareToPlatform(url){
    var data=shareData();
    if(nativeFiles && data && navigator.canShare(data)){ navigator.share(data).catch(function(){}); return; }
    try { if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(caption()); } catch(e){}
    openWin(url);
    doDownload();
    toast('Image saved · caption copied');
  }
  function doCopy(){
    var txt=caption();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){ toast(SH.copiedToast||'Caption copied'); })
        .catch(function(){ fallbackCopy(txt); });
    } else fallbackCopy(txt);
  }
  function fallbackCopy(txt){
    var ta=document.createElement('textarea'); ta.value=txt;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); toast(SH.copiedToast||'Caption copied'); }catch(e){}
    ta.remove();
  }
  function openWin(url){ window.open(url, '_blank', 'noopener,noreferrer'); }

  // ---------- modal open / close ----------
  var lastFocus=null;
  function openModal(){
    lastFocus=document.activeElement;
    overlay.removeAttribute('hidden');
    overlay.classList.add('open');
    document.body.style.overflow='hidden';
    ensureFonts(draw);
    var cb=$('shareClose'); if(cb) cb.focus();
  }
  function closeModal(){
    overlay.classList.remove('open');
    overlay.setAttribute('hidden','');
    document.body.style.overflow='';
    if(lastFocus && lastFocus.focus) lastFocus.focus();
  }

  // ---------- wire it up ----------
  var openBtn=$('shareOpenBtn'); if(openBtn) openBtn.addEventListener('click', openModal);
  var closeBtn=$('shareClose'); if(closeBtn) closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) closeModal(); });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape' && overlay.classList.contains('open')) closeModal();
  });


  var nativeBtn=$('shareNative');
  if(nativeBtn && nativeFiles){ nativeBtn.hidden=false; nativeBtn.addEventListener('click', doNative); }
  var dl=$('shareDownload'); if(dl) dl.addEventListener('click', doDownload);
  var cp=$('shareCopy'); if(cp) cp.addEventListener('click', doCopy);
  var bx=$('shareX'); if(bx) bx.addEventListener('click', function(){
    shareToPlatform('https://twitter.com/intent/tweet?text='+enc(caption())+'&hashtags='+enc(SH.hashtags||''));
  });
  var wa=$('shareWA'); if(wa) wa.addEventListener('click', function(){
    shareToPlatform('https://wa.me/?text='+enc(caption()));
  });
  var li=$('shareLI'); if(li) li.addEventListener('click', function(){
    shareToPlatform('https://www.linkedin.com/sharing/share-offsite/?url='+enc(SHARE_URL));
  });
  var fb=$('shareFB'); if(fb) fb.addEventListener('click', function(){
    shareToPlatform('https://www.facebook.com/sharer/sharer.php?u='+enc(SHARE_URL));
  });

  // Expose for quick manual testing / preview generation.
  window.__ggfShare = { draw:draw, setStyle:function(s){ currentStyle=s; ensureFonts(draw); }, canvas:canvas };
})();
</script>
<script>
/* Auto-height when embedded in an iframe: report content height to the parent
   so there is no nested scrollbar and the host page scrolls normally. */
(function(){
  if (window.self === window.top) return;
  document.documentElement.classList.add('embedded');
  function post(){
    var b = document.body, d = document.documentElement;
    var h = Math.ceil(Math.max(b.scrollHeight, b.getBoundingClientRect().height, d.scrollHeight));
    try { parent.postMessage({ ggfToolHeight: h }, '*'); } catch (e) {}
  }
  var raf;
  function schedule(){ cancelAnimationFrame(raf); raf = requestAnimationFrame(post); }
  document.addEventListener('DOMContentLoaded', schedule);
  window.addEventListener('load', schedule);
  window.addEventListener('resize', schedule);
  document.addEventListener('transitionend', schedule, true);
  document.addEventListener('animationend', schedule, true);
  document.addEventListener('input', schedule, true);
  document.addEventListener('click', function(){ setTimeout(schedule, 60); }, true);
  if (window.ResizeObserver){ new ResizeObserver(schedule).observe(document.body); }
  setTimeout(schedule, 120); setTimeout(schedule, 600);

  // ---- Pin the levers bar to the top of the screen while the host page scrolls ----
  // The parent posts how far the frame has scrolled past the viewport top; we slide
  // the controls bar down by that much so it stays glued to the top (Budget slide only).
  function pinLevers(frameTop){
    var bar = document.querySelector('.controls-bar');
    if (!bar) return;
    var s1 = document.getElementById('slide-1');
    if (!s1 || !s1.classList.contains('active')){ bar.style.transform = ''; return; }
    bar.style.transform = '';                       // reset before measuring
    var card = bar.closest('.card');
    var barTop = bar.getBoundingClientRect().top;    // bar's resting top inside the frame
    var screenTop = frameTop + barTop;               // bar's position relative to the host viewport top
    if (screenTop < 0 && card){
      var cr = card.getBoundingClientRect(), bh = bar.getBoundingClientRect().height;
      var maxOffset = Math.max(0, cr.bottom - barTop - bh);  // release before it leaves the card
      var offset = Math.min(-screenTop, maxOffset);          // pull it flush to the top (0)
      if (offset > 0) bar.style.transform = 'translateY(' + offset + 'px)';
    }
  }
  var praf;
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (typeof d.ggfFrameTop === 'number'){
      cancelAnimationFrame(praf);
      praf = requestAnimationFrame(function(){ pinLevers(d.ggfFrameTop); });
    }
  });
})();
</script>
